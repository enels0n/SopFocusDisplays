focus:
  update-interval-ticks: 2
  max-distance: 16.0
  focus-angle-degrees: 10.0
  lerp-speed: 0.25

conditions:
  refresh-interval-ticks: 20

debug:
  conditions: false

display:
  base-scale: 1.0
  focus-scale: 1.25
  item-transform: FIXED
  billboard: FIXED
  brightness-block: -1
  brightness-sky: -1
  shadow-radius: 0.0
  shadow-strength: 0.0
  display-width: 0.7
  display-height: 0.7

text:
  default-text: '<gold>Focus Text</gold>'
  line-spacing: 0.3
  line-width: 200
  background-enabled: false
  background-color: '#00000000'
  shadowed: false
  see-through: true
  default-alignment: CENTER

create:
  spawn-distance: 2.5
  y-offset: 0.0
  target-block-distance: 10
  pitch-offset: 0.0

hologram:
  armor-stand-small: false
  armor-stand-marker: true
  line-spacing: 0.27
